<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="./src//assets/svg/logo-KA.svg"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Khushal Automation Agency — Automate the boring stuff</title>
    <meta
      name="description"
      content="Custom workflow automations for businesses. Trigger-based workflows, form processing, webhooks, integrations."
    />
    <script>
      (() => {
        try {
          const savedTheme = window.localStorage.getItem("theme");
          const theme = savedTheme === "dark" ? "dark" : "light";
          document.documentElement.classList.toggle("dark", theme === "dark");
          document.documentElement.dataset.theme = theme;
        } catch {
          document.documentElement.dataset.theme = "light";
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
